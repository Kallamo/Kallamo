<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05161d"/>
      <stop offset="45%" stop-color="#0a2230"/>
      <stop offset="72%" stop-color="#13384a"/>
      <stop offset="100%" stop-color="#1d4a5f"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f4e7c1"/>
      <stop offset="60%" stop-color="#e6d4a0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e6d4a0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#163a4b"/>
      <stop offset="100%" stop-color="#08171f"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f4e7c1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f4e7c1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020a0e" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#020a0e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020a0e" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- moon -->
  <circle cx="1180" cy="240" r="190" fill="url(#moon)"/>
  <circle cx="1180" cy="240" r="74" fill="#f6eccf"/>

  <!-- stars -->
  <g fill="#cfe3ea">
    <circle cx="180" cy="120" r="1.6" opacity="0.8"/>
    <circle cx="320" cy="220" r="1.2" opacity="0.6"/>
    <circle cx="540" cy="90" r="1.8" opacity="0.7"/>
    <circle cx="760" cy="180" r="1.1" opacity="0.5"/>
    <circle cx="430" cy="300" r="1.3" opacity="0.5"/>
    <circle cx="980" cy="120" r="1.4" opacity="0.6"/>
    <circle cx="1440" cy="150" r="1.6" opacity="0.7"/>
    <circle cx="120" cy="300" r="1.2" opacity="0.5"/>
    <circle cx="660" cy="60" r="1.2" opacity="0.6"/>
  </g>

  <!-- light beam from the lantern -->
  <polygon points="430,250 1600,90 1600,430" fill="url(#beam)"/>

  <!-- sea -->
  <rect x="0" y="600" width="1600" height="300" fill="url(#sea)"/>
  <g stroke="#3b6b80" stroke-width="2" opacity="0.35">
    <line x1="0" y1="660" x2="1600" y2="660"/>
    <line x1="0" y1="710" x2="1600" y2="710"/>
    <line x1="0" y1="770" x2="1600" y2="770"/>
    <line x1="0" y1="840" x2="1600" y2="840"/>
  </g>

  <!-- cliff -->
  <path d="M0,640 L120,560 L260,600 L360,520 L470,560 L470,900 L0,900 Z" fill="#04141b"/>

  <!-- lighthouse -->
  <g>
    <polygon points="392,560 448,560 436,300 404,300" fill="#0c2630"/>
    <rect x="402" y="270" width="36" height="34" rx="3" fill="#0f2f3b"/>
    <rect x="406" y="246" width="28" height="26" rx="3" fill="#f4e7c1" opacity="0.92"/>
    <polygon points="402,246 438,246 420,220" fill="#0c2630"/>
    <g fill="#163a4b">
      <rect x="404" y="320" width="32" height="14"/>
      <rect x="406" y="380" width="28" height="14"/>
      <rect x="408" y="440" width="24" height="14"/>
      <rect x="410" y="500" width="20" height="14"/>
    </g>
  </g>

  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
