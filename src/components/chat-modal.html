<div id="chat-modal" class="fixed inset-0 bg-black/80 z-[999] hidden flex items-center justify-center p-4 backdrop-blur-sm opacity-0 transition-opacity duration-200">
    <div class="bg-[#051116] border border-gray-800 rounded-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 custom-scrollbar flex flex-col space-y-5">
        <div>
            <h2 class="text-xl font-bold text-white tracking-wide">Workspace Settings</h2>
            <p class="text-xs text-gray-400 mt-1">Configure your workspace environment, initial profiles, and global knowledge base.</p>
        </div>
        
        <div class="space-y-5 flex-1">
            
            <div class="grid grid-cols-3 gap-5">
                <div class="col-span-1 flex flex-col">
                    <label class="block text-xs font-bold text-gray-200 mb-1.5">Cover Image</label>
                    <div id="c-modal-bg-preview" class="w-full flex-1 min-h-[100px] rounded-lg bg-[#011419] border border-gray-800 hover:border-[var(--app-accent)] flex flex-col items-center justify-center cursor-pointer transition-colors bg-cover bg-center bg-no-repeat relative group overflow-hidden">
                        
                        <div id="c-modal-bg-placeholder" class="flex flex-col items-center justify-center pointer-events-none transition-opacity duration-200">
                            <svg class="text-gray-600 mb-1" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            <span class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold">Upload</span>
                        </div>
                        
                        <button id="btn-c-modal-clear-bg" class="absolute inset-0 w-full h-full bg-black/70 text-white text-[10px] font-bold tracking-widest opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center cursor-pointer hidden">REMOVE</button>
                    </div>
                    <input type="file" id="c-modal-bg-image" accept="image/*" class="hidden">
                </div>

                <div class="col-span-2 flex flex-col space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-200 mb-1.5">Workspace Name</label>
                        <input type="text" id="c-modal-name" class="w-full bg-[#011419] border border-gray-800 text-white text-sm rounded-md px-3 py-2 focus:outline-none focus:border-[var(--app-accent)]" placeholder="e.g., Novel Project, Code Sandbox...">
                    </div>
                    <div class="flex-1 flex flex-col">
                        <label class="block text-xs font-bold text-gray-200 mb-1.5">Description (Optional)</label>
                        <textarea id="c-modal-desc" class="w-full flex-1 bg-[#011419] border border-gray-800 text-white text-sm rounded-md px-3 py-2 focus:outline-none focus:border-[var(--app-accent)] resize-none" placeholder="Brief summary of this workspace..."></textarea>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 pt-2">
                <div class="flex flex-col h-56">
                    <label class="block text-xs font-bold text-gray-200 mb-1.5">Pre-activate Profiles</label>
                    <div class="bg-[#011419] border border-gray-800 rounded-lg flex flex-col flex-1 overflow-hidden">
                        <div class="p-2 border-b border-gray-800/80">
                            <div class="relative">
                                <svg class="absolute left-2.5 top-1/2 transform -translate-y-1/2 text-gray-500" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                                <input type="text" id="c-modal-search-profiles" placeholder="Search profiles..." class="w-full bg-[#051116] border border-gray-800/50 text-gray-300 text-[11px] rounded pl-7 pr-2 py-1.5 focus:outline-none focus:border-[var(--app-accent)] transition-colors">
                            </div>
                        </div>
                        <div id="c-modal-profiles-list" class="flex-1 overflow-y-auto custom-scrollbar p-1"></div>
                    </div>
                </div>
                
                <div class="flex flex-col h-56">
                    <label class="block text-xs font-bold text-gray-200 mb-1.5">Pre-activate Workflows</label>
                    <div class="bg-[#011419] border border-gray-800 rounded-lg flex flex-col flex-1 overflow-hidden">
                        <div class="p-2 border-b border-gray-800/80">
                            <div class="relative">
                                <svg class="absolute left-2.5 top-1/2 transform -translate-y-1/2 text-gray-500" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                                <input type="text" id="c-modal-search-workflows" placeholder="Search workflows..." class="w-full bg-[#051116] border border-gray-800/50 text-gray-300 text-[11px] rounded pl-7 pr-2 py-1.5 focus:outline-none focus:border-[var(--app-accent)] transition-colors">
                            </div>
                        </div>
                        <div id="c-modal-workflows-list" class="flex-1 overflow-y-auto custom-scrollbar p-1"></div>
                    </div>
                </div>
            </div>

            <div>
                <div class="flex items-center space-x-1.5 mb-1.5 mt-2">
                    <label class="block text-xs font-bold text-gray-200">Global Chat Knowledge Base (Shared RAG)</label>
                    <svg data-tooltip="Documents added here act as the global memory for this workspace. All AI profiles will automatically pull relevant context from these files when answering questions." width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500 cursor-help hover:text-[var(--app-accent)] transition-colors"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                </div>
                <div id="c-modal-dropzone" class="border-2 border-dashed border-gray-800 hover:border-[var(--app-accent)] bg-[#011419]/50 rounded-xl p-4 text-center cursor-pointer transition-colors group">
                    <svg class="mx-auto mb-1 text-gray-600 group-hover:text-[var(--app-accent)] transition-colors" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <p class="text-[11px] text-gray-400 font-medium">Drag and drop document files here, or <span class="text-[var(--app-accent)]">browse files</span></p>
                    <input type="file" id="c-modal-file-input" class="hidden" multiple accept=".pdf,.docx,.txt,.md">
                </div>
                <div id="c-modal-file-list" class="flex flex-wrap gap-2 mt-2"></div>
            </div>
            
        </div>
        <div class="flex justify-end space-x-3 pt-2 shrink-0 border-t border-gray-800/60">
            <button type="button" id="btn-cancel-chat-modal" class="px-4 py-2 text-xs font-semibold text-gray-400 hover:text-white transition-colors">Cancel</button>
            <button type="button" id="btn-save-chat-modal" class="px-4 py-2 text-xs bg-[var(--app-accent)] text-[#011419] font-bold rounded-md hover:brightness-110 transition-colors shadow-sm min-w-24 flex items-center justify-center">Create Workspace</button>
        </div>
    </div>
</div>
