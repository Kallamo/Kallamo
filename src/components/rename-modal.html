<div id="rename-modal" class="fixed inset-0 z-[120] bg-black/60 backdrop-blur-sm flex items-center justify-center p-8 hidden transition-opacity duration-200">
    <div class="w-full max-w-sm bg-[#000D11] rounded-xl shadow-2xl border border-gray-800/60 flex flex-col overflow-hidden">
        <div class="p-6">
            <h3 class="text-lg font-bold text-white mb-4">Rename Chat</h3>
            <input type="text" id="rename-input" class="w-full bg-[#011419] border border-gray-800 text-gray-200 text-sm rounded-md px-3 py-2 focus:outline-none focus:border-[#DDBA6E]" autocomplete="off">
        </div>
        <div class="bg-[#011419] px-6 py-4 border-t border-gray-800/50 flex justify-end space-x-3">
            <button id="btn-cancel-rename" class="px-4 py-2 text-sm font-medium text-gray-400 hover:text-white transition-colors">Cancel</button>
            <button id="btn-confirm-rename" class="px-4 py-2 text-sm font-medium bg-[#DDBA6E] hover:bg-[#ebd093] text-[#011419] rounded transition-colors shadow-md">Save</button>
        </div>
    </div>
</div>
