<div id="summarize-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/60 backdrop-blur-sm transition-opacity opacity-0">
        <div class="bg-[#0a161d] border border-gray-800 rounded-xl shadow-2xl w-full max-w-2xl flex flex-col overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-800 flex justify-between items-center bg-[#051116]">
                <div>
                    <h3 class="text-lg font-bold text-white tracking-wide">Select Messages to Archive</h3>
                    <p class="text-xs text-gray-400 mt-1">Unselected messages will be ignored and skipped permanently.</p>
                </div>
                <button id="btn-summarize-select-all" class="text-xs bg-[#1a2d32] hover:bg-[#243b52] text-[#DDBA6E] px-3 py-1.5 rounded transition-colors border border-[#DDBA6E]/30">Deselect All</button>
            </div>
            <div id="summarize-msg-list" class="p-4 max-h-[60vh] overflow-y-auto custom-scrollbar space-y-3 bg-[#011419]">
                </div>
            <div class="px-6 py-4 border-t border-gray-800 bg-[#051116] flex justify-end space-x-3">
                <button id="btn-cancel-summarize" class="px-4 py-2 text-sm text-gray-400 hover:text-white transition-colors">Cancel</button>
                <button id="btn-confirm-summarize" class="px-4 py-2 text-sm bg-[#DDBA6E] text-[#011419] font-bold rounded hover:bg-[#ebd093] transition-colors shadow-md">Confirm & Archive</button>
            </div>
        </div>
    </div>
