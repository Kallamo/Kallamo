<div id="workflow-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[150] flex items-center justify-center hidden opacity-0 transition-opacity duration-200">
    <!-- Modal Container -->
    <div class="bg-[#011419] border border-gray-800 rounded-lg w-full max-w-3xl flex flex-col shadow-2xl transform scale-95 transition-transform duration-200">
        
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-800 bg-[#000D11] rounded-t-lg">
            <h2 class="text-white text-lg font-semibold tracking-wide">Create Agent Workflow</h2>
            <button id="btn-close-workflow-modal" class="text-gray-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <!-- Body (Scrollable) -->
        <div id="workflow-form-body" class="p-6 overflow-y-auto max-h-[70vh] space-y-6">
            
            <!-- Workflow Name -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Workflow Name</label>
                <input type="text" id="workflow-name" placeholder="e.g., Narrative Refiner Pipeline" class="w-full bg-[#000D11] border border-gray-700 text-white text-sm rounded px-3 py-2 focus:outline-none focus:border-[#DDBA6E] transition-colors">
            </div>

            <hr class="border-gray-800">

            <!-- Node 1: Entry Point -->
            <div class="bg-[#000D11] border border-gray-800 rounded-md p-4 relative">
                <div class="absolute -left-6 top-1 bg-[#DDBA6E] text-black text-xs font-bold px-2 py-0.5 rounded shadow">START</div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 ml-4">Initial Profile (Entry)</label>
                
                <!-- Searchable Select UI (Placeholder for JS injection) -->
                <div class="ml-4 relative custom-dropdown-container">
                    <input type="text" placeholder="Type to search profile..." class="custom-dropdown-input w-full bg-[#011419] border border-gray-700 text-white text-sm rounded px-3 py-2 focus:outline-none focus:border-[#DDBA6E] transition-colors" autocomplete="off">
                    <input type="hidden" class="custom-dropdown-value">
                    
                    <div class="custom-dropdown-list hidden absolute z-50 w-full mt-1 bg-[#011419] border border-gray-700 rounded shadow-lg max-h-40 overflow-y-auto custom-scrollbar">
                        </div>
                </div>
            </div>

            <!-- Container for Dynamic Steps -->
            <div id="workflow-steps-container" class="space-y-4">
            </div>

            <!-- Add Step Button -->
            <div class="flex justify-center mt-4">
                <button id="btn-add-workflow-step" class="flex items-center space-x-2 text-sm text-[#DDBA6E] border border-[#DDBA6E]/30 bg-[#DDBA6E]/10 hover:bg-[#DDBA6E]/20 px-4 py-2 rounded-full transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span>Add Step</span>
                </button>
            </div>

        </div>

        <!-- Footer -->
        <div class="flex justify-end space-x-3 px-6 py-4 border-t border-gray-800 bg-[#000D11] rounded-b-lg">
            <button id="btn-cancel-workflow" class="px-4 py-2 text-sm text-gray-300 hover:text-white transition-colors">Cancel</button>
            <button id="btn-save-workflow" class="px-6 py-2 text-sm bg-[#DDBA6E] text-black font-semibold rounded hover:bg-[#c5a358] transition-colors shadow-lg">Save Workflow</button>
        </div>
    </div>
</div>
